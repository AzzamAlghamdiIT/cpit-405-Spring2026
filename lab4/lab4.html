<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Great Auto Parts - Order Form</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#e6e6e6;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-top:10px;
            font-weight:bold;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        textarea{
            height:150px;
        }

        button{
            width:100%;
            background:black;
            color:white;
            padding:12px;
            margin-top:15px;
            border:none;
            font-size:16px;
        }

        button:hover{
            background:#333;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Great Auto Parts - Order Form</h1>

    <form>

        <label>First Name:</label>
        <input type="text" placeholder="Enter your first name">

        <label>Last Name:</label>
        <input type="text" placeholder="Enter your last name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email address">

        <label>Phone number:</label>
        <input type="tel" placeholder="Enter your phone number">

        <label>Make:</label>
        <input type="text" placeholder="Make">

        <label>Model:</label>
        <input type="text" placeholder="Model">

        <label>Year:</label>
        <input type="number" placeholder="Year">

        <label>Date:</label>
        <input type="date">

        <label>Spare Part:</label>
        <input type="text" placeholder="Enter the spare part you need">

        <label>Quantity:</label>
        <input type="number" placeholder="Enter the quantity of the spare part you need">

        <label>Comment:</label>
        <textarea placeholder="Enter your comment"></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
